name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils

      - name: Build module tarball
        run: |
          chmod +x scripts/build.sh
          CROSS_PREFIX=aarch64-linux-gnu- ./scripts/build.sh
          test -f dist/granny-grain-module.tar.gz
          test -f dist/granny/dsp.so

      - name: Verify package contents
        run: |
          tar -tzf dist/granny-grain-module.tar.gz | grep -q 'granny/module.json'
          tar -tzf dist/granny-grain-module.tar.gz | grep -q 'granny/dsp.so'
          tar -tzf dist/granny-grain-module.tar.gz | grep -q 'granny/README.md'
          tar -tzf dist/granny-grain-module.tar.gz | grep -q 'granny/help.json'

      - name: Verify GLIBC Compatibility
        run: |
          syms="$(strings dist/granny/dsp.so | grep -oE 'GLIBC_[0-9]+\.[0-9]+' || true)"
          if [ -z "$syms" ]; then
            echo "No GLIBC symbols found in dsp.so (unexpected)."
            exit 1
          fi
          max_glibc="$(echo "$syms" | sed 's/GLIBC_//' | sort -V | tail -n 1)"
          echo "Max GLIBC symbol: $max_glibc"
          if [ "$(printf '%s\n' "$max_glibc" "2.17" | sort -V | tail -n 1)" != "2.17" ]; then
            echo "Incompatible GLIBC symbol version detected: $max_glibc (expected <= 2.17)"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/granny-grain-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
